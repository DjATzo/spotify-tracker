<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />

<title>Playcount</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0a; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }
  .app { max-width: 1200px; margin: 0 auto; }

  /* NAVBAR */
  .navbar { display: flex; align-items: center; padding: 0 24px; height: 52px; gap: 32px; border-bottom: 0.5px solid rgba(255,255,255,0.08); background: #0d0d0d; position: sticky; top: 0; z-index: 100; }
  .logo { font-size: 18px; font-weight: 500; letter-spacing: -0.02em; flex-shrink: 0; }
  .logo span { color: #1DB954; }
  .logo em { font-size: 11px; font-weight: 400; color: #F97316; margin-left: 6px; font-style: normal; }

  /* NAV LINKS */
  .nav-links { display: flex; align-items: center; flex: 1; }
  .nav-item { position: relative; }
  .nav-item-label { font-size: 13px; padding: 0 14px; height: 52px; display: flex; align-items: center; color: #666; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color 0.15s; white-space: nowrap; user-select: none; }
  .nav-item-label:hover { color: #fff; }
  .nav-item-label.active { color: #fff; border-bottom: 2px solid #1DB954; }

  /* DROPDOWN */
  .nav-dropdown { display: none; position: absolute; top: calc(100% + 1px); left: 0; background: #161616; border: 0.5px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 6px; min-width: 190px; z-index: 200; }
  .nav-item:hover .nav-dropdown { display: block; }
  .drop-item { display: block; font-size: 13px; padding: 8px 12px; color: #777; border-radius: 6px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .drop-item:hover { background: #222; color: #fff; }
  .drop-item.active { color: #1DB954; }

  .nav-right { display: flex; align-items: center; gap: 12px; margin-left: auto; flex-shrink: 0; }
  .avatar { width: 30px; height: 30px; border-radius: 50%; background: #1DB954; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; color: #000; }
  .logout-btn { font-size: 12px; color: #666; background: none; border: 0.5px solid rgba(255,255,255,0.1); padding: 4px 12px; border-radius: 20px; cursor: pointer; }
  .logout-btn:hover { color: #fff; border-color: rgba(255,255,255,0.3); }

  /* PAGES */
  .page { display: none; }
  .page.active { display: block; }

  /* SECTION HEADER */
  .section-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 24px 10px; flex-wrap: wrap; gap: 10px; }
  .pills { display: flex; gap: 6px; flex-wrap: wrap; }
  .pill { font-size: 13px; padding: 6px 14px; border-radius: 20px; background: #1a1a1a; color: #666; border: 0.5px solid rgba(255,255,255,0.08); cursor: pointer; transition: all 0.15s; }
  .pill:hover { color: #aaa; }
  .pill.active { background: #1DB954; color: #000; font-weight: 500; border-color: transparent; }

  .entries-wrap { display: flex; align-items: center; gap: 8px; }
  .entries-label { font-size: 12px; color: #666; }
  .entries-select { background: #111; border: none; outline: none; color: #1DB954; padding: 3px 4px; font-size: 11px; cursor: pointer; }
  .entries-select:focus { background: transparent; outline: none; }

  /* SUBTABS */
  .subtabs { display: flex; gap: 4px; padding: 0 24px 10px; flex-wrap: wrap; }
  .subtab { font-size: 11px; padding: 4px 12px; border-radius: 6px; background: #1a1a1a; color: #666; border: 0.5px solid rgba(255,255,255,0.07); cursor: pointer; transition: all 0.15s; }
  .subtab.active { background: rgba(29,185,84,0.18); color: #1DB954; border-color: rgba(29,185,84,0.3); }

  /* TAB CONTENT */
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* TRACK LIST */
  .track-list { padding: 0 24px 24px; display: flex; flex-direction: column; gap: 3px; }
  .track-row { display: flex; align-items: center; gap: 12px; padding: 8px 12px; border-radius: 6px; background: #111; transition: background 0.15s; }
  .track-row:hover { background: #161616; }
  .track-num { font-size: 11px; color: #444; width: 18px; text-align: right; flex-shrink: 0; }
  .track-thumb { width: 34px; height: 34px; border-radius: 3px; flex-shrink: 0; }
  .track-info { flex: 1; min-width: 0; }
  .track-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .track-artist { font-size: 11px; color: #555; margin-top: 1px; }
  .bar-wrap { margin-top: 5px; }
  .bar-bg { height: 2px; background: rgba(255,255,255,0.06); border-radius: 1px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 1px; }
  .bar-green { background: #1DB954; }
  .bar-amber { background: #F59E0B; }
  .track-right { display: flex; flex-direction: column; align-items: flex-end; flex-shrink: 0; min-width: 52px; }
  .play-count { font-size: 22px; font-weight: 500; line-height: 1; color: #1DB954; }
  .play-count.amber { color: #F59E0B; }
  .plays-label { font-size: 8px; color: #444; letter-spacing: 0.06em; text-transform: uppercase; margin-top: 1px; }
  .time-ago { font-size: 10px; color: #444; margin-top: 2px; }
  .badge-alltime { font-size: 9px; padding: 1px 7px; border-radius: 20px; background: rgba(245,158,11,0.15); color: #F59E0B; font-weight: 500; margin-top: 3px; }

  /* ARTIST LIST */
  .artist-list { padding: 0 24px 24px; display: flex; flex-direction: column; gap: 3px; }
  .artist-row { display: flex; align-items: center; gap: 12px; padding: 8px 12px; border-radius: 6px; background: #111; transition: background 0.15s; }
  .artist-row:hover { background: #161616; }
  .artist-thumb { width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0; }
  .artist-info { flex: 1; min-width: 0; }
  .artist-name { font-size: 13px; font-weight: 500; }
  .artist-sub { font-size: 11px; color: #555; margin-top: 1px; }
  .badge-following { font-size: 10px; padding: 2px 9px; border-radius: 20px; background: rgba(29,185,84,0.15); color: #1DB954; font-weight: 500; flex-shrink: 0; }
  .letter-divider { font-size: 11px; color: #444; font-weight: 500; padding: 8px 12px 4px; letter-spacing: 0.06em; }

  /* MOBILE */
  @media (max-width: 600px) {
    .navbar { padding: 0 16px; gap: 16px; }
    .logo { font-size: 16px; }
    .logout-btn { display: none; }
    .nav-item-label { padding: 0 10px; font-size: 12px; }
    .section-header { padding: 12px 16px 8px; flex-direction: column; align-items: flex-start; }
    .entries-wrap { align-self: flex-end; }
    .subtabs { padding: 0 16px 8px; }
    .track-list { padding: 0 16px 20px; }
    .artist-list { padding: 0 16px 20px; }
    .play-count { font-size: 18px; }
  }
</style>

  // ── RENDER ───────────────────────────────────────────────────
  function renderTrackRow(t, i, isListened) {
    return `<div class="track-row">
      <div class="track-num">${i+1}</div>
      <div class="track-thumb" style="background:${t.color}"></div>
      <div class="track-info">
        <div class="track-name">${t.name}</div>
        <div class="track-artist">${t.artist}</div>
        <div class="bar-wrap"><div class="bar-bg"><div class="bar-fill ${isListened?'bar-amber':'bar-green'}" style="width:${t.pct}%"></div></div></div>
      </div>
      <div class="track-right">
        <div class="play-count ${isListened?'amber':''}">${t.plays}</div>
        <div class="plays-label">plays</div>
        ${isListened ? '<div class="badge-alltime">top</div>' : `<div class="time-ago">${t.ago}</div>`}
      </div>
    </div>`;
  }

  function renderArtistRow(a) {
    return `<div class="artist-row">
      <div class="artist-thumb" style="background:${a.color}"></div>
      <div class="artist-info">
        <div class="artist-name">${a.name}</div>
        ${a.followedAgo ? `<div class="artist-sub">${a.followedAgo}</div>` : ''}
      </div>
      ${a.plays !== undefined
        ? `<div class="track-right"><div class="play-count">${a.plays}</div><div class="plays-label">plays</div></div>`
        : `<div class="badge-following">following</div>`}
    </div>`;
  }

  function renderAllArtists(list) {
    let html = '', last = '';
    list.forEach(a => {
      const l = a.name[0].toUpperCase();
      if (l !== last) { html += `<div class="letter-divider">${l}</div>`; last = l; }
      html += `<div class="artist-row"><div class="artist-thumb" style="background:${a.color}"></div><div class="artist-name">${a.name}</div><div class="badge-following">following</div></div>`;
    });
    return html;
  }

  function render() {
    const n = state.entries;

    // Recently played — filter by liked/notliked
    let recent = recentTracks.slice(0, n.tracks);
    if (state.recentSubtab === 'liked') recent = recentTracks.filter(t => t.liked).slice(0, n.tracks);
    if (state.recentSubtab === 'notliked') recent = recentTracks.filter(t => !t.liked).slice(0, n.tracks);
    document.getElementById('list-recent').innerHTML = recent.map((t, i) => renderTrackRow(t, i, false)).join('');

    // Most listened
    const ld = listenedData[state.listenedSubtab] || listenedData['7days'];
    document.getElementById('list-listened').innerHTML = ld.slice(0, n.tracks).map((t, i) => renderTrackRow(t, i, true)).join('');

    // Top artists
    document.getElementById('list-top-artists').innerHTML = (topArtistsData[state.topSubtab] || topArtistsData.week).slice(0, n.artists).map(renderArtistRow).join('');

    // Followed
    document.getElementById('list-followed').innerHTML = followedArtists.slice(0, n.artists).map(renderArtistRow).join('');

    // All artists — no entries limit
    document.getElementById('list-all-artists').innerHTML = renderAllArtists(allArtists);
  }

  // ── NAVIGATION ───────────────────────────────────────────────
  function goTo(page, tab) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + page).classList.add('active');
    document.getElementById('nav-tracks').classList.toggle('active', page === 'tracks');
    document.getElementById('nav-artists').classList.toggle('active', page === 'artists');
    state.page = page;
    setTab(page, tab);
    window.location.hash = page + '/' + tab;
  }

  function setTab(page, tab) {
    if (page === 'tracks') state.tracksTab = tab;
    else state.artistsTab = tab;
    document.querySelectorAll('#page-' + page + ' .pill').forEach(p => p.classList.remove('active'));
    const pill = document.getElementById('pill-' + page + '-' + tab);
    if (pill) pill.classList.add('active');
    document.querySelectorAll('#page-' + page + ' .tab-content').forEach(t => t.classList.remove('active'));
    const tc = document.getElementById(page + '-' + tab);
    if (tc) tc.classList.add('active');
    render();
  }

  function setSubtab(key, el) {
    state.topSubtab = key;
    el.closest('.subtabs').querySelectorAll('.subtab').forEach(s => s.classList.remove('active'));
    el.classList.add('active');
    render();
  }

  function setListenedSubtab(key, el) {
    state.listenedSubtab = key;
    el.closest('.subtabs').querySelectorAll('.subtab').forEach(s => s.classList.remove('active'));
    el.classList.add('active');
    render();
  }

  function setRecentSubtab(key, el) {
    state.recentSubtab = key;
    el.closest('.subtabs').querySelectorAll('.subtab').forEach(s => s.classList.remove('active'));
    el.classList.add('active');
    render();
  }

  function setEntries(page, val) {
    state.entries[page] = parseInt(val);
    render();
  }

  // ── INIT from hash ────────────────────────────────────────────
  function initFromHash() {
    const hash = window.location.hash.replace('#', '');
    const [page, tab] = hash.split('/');
    const valid = { tracks: ['recent', 'listened'], artists: ['top', 'followed', 'all'] };
    if (page && valid[page]) {
      goTo(page, (tab && valid[page].includes(tab)) ? tab : valid[page][0]);
    } else {
      goTo('tracks', 'recent');
    }
  }

  window.addEventListener('hashchange', initFromHash);
  initFromHash();
